name: 🐛 Bug Report
description: Report a bug or issue in the Adapters library.
title: "[BUG]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting this issue! Please provide as much detailed context as possible to help us reproduce and resolve the bug quickly.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: Describe the unexpected behavior...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproducible Code
      description: Provide a minimal, self-contained Rust code block or JSON payload to reproduce the issue.
      render: rust
      placeholder: |
        use adapters::prelude::*;
        // Code to reproduce here...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened...
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment Info
      description: Rust compiler version, OS, Adapters version, etc.
      placeholder: e.g. rustc 1.85.0-stable, Windows 11, adapters v0.1.0
    validations:
      required: true
