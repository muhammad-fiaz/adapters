name: 🚀 Feature Request
description: Propose a new feature, rule, or enhancement for Adapters.
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We are eager to make Adapters even more powerful and fully-featured! Please outline your request in detail.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem or limitation is.
      placeholder: e.g. I am frustrated when trying to...
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the proposed solution
      description: A clear and detailed description of the API additions, macro changes, or rules you want added.
      placeholder: Describe the new feature/rule...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: A clear description of any alternative solutions or workarounds you've considered.
      placeholder: Any alternative solutions...
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Add any other context, code design ideas, or screenshots about the feature request here.
      placeholder: e.g. code snippets of similar libraries...
